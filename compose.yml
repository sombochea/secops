services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: secops
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/18/docker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d secops"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal

  worker:
    image: ${COMPOSE_PROJECT_NAME:-secops}-worker:latest
    build:
      context: ./worker
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-postgres}@db:5432/secops
      WAL_DIR: /data/wal
    command:
      ["-addr", ":4000", "-workers", "4", "-batch", "500", "-flush", "2s"]
    volumes:
      - worker-wal:/data/wal
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4000/health"]
      interval: 10s
      timeout: 3s
      retries: 3
    depends_on:
      db:
        condition: service_healthy
    deploy:
      replicas: ${WORKER_REPLICAS:-1}
    networks:
      - internal

  # Load balancer — activate with: docker compose --profile scaled up
  balancer:
    image: ${COMPOSE_PROJECT_NAME:-secops}-worker:latest
    restart: unless-stopped
    command:
      [
        "-mode",
        "balancer",
        "-addr",
        ":4000",
        "-strategy",
        "${LB_STRATEGY:-round-robin}",
      ]
    environment:
      BACKENDS: ${WORKER_BACKENDS:-http://worker:4000}
    ports:
      - "${WORKER_PORT:-4000}:4000"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4000/health"]
      interval: 10s
      timeout: 3s
      retries: 3
    depends_on:
      - worker
    profiles:
      - scaled
    networks:
      - internal

  app:
    image: ${COMPOSE_PROJECT_NAME:-secops}-app:latest
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-postgres}@db:5432/secops
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?Set BETTER_AUTH_SECRET in .env}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      WEBHOOK_WORKER_URL: http://worker:4000
    healthcheck:
      test:
        ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 3s
      start_period: 40s
      retries: 3
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

volumes:
  pgdata:
  worker-wal:

networks:
  internal:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.218.0/24
