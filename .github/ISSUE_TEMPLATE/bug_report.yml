name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      placeholder: A clear description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What you expected to happen.
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Logs
      placeholder: Paste any relevant screenshots or error logs.
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: e.g. v0.1.0
  - type: dropdown
    id: deployment
    attributes:
      label: Deployment
      options:
        - Docker
        - Local (bun dev)
        - Other
