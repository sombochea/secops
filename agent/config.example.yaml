# SecOps Agent configuration
# Place at /etc/secops-agent/config.yaml

# SOC dashboard endpoint
endpoint: "https://secops.example.com/api/webhook"

# Webhook key from Settings → Webhook Keys
webhook_key: "whk_your_key_here"

# Override auto-detected hostname (optional)
# hostname: "prod-server-01"

# Batching: send events in groups
batch_size: 50   # max events per request
flush_sec: 5     # flush interval in seconds

# Auto-update: check GitHub releases for new agent versions on startup
auto_update: true
# update_repo: "sombochea/secops"  # default repo to check

# ---------------------------------------------------------------------------
# Connection tracking
# ---------------------------------------------------------------------------
# Periodically snapshots active TCP connections (via `ss` on Linux or
# `netstat` on macOS/BSD) and emits "connection_established" events to the
# SOC dashboard.  When a remote IP has already triggered failed-auth or other
# bad-status events beyond 'suspicious_threshold', subsequent connections from
# that IP are emitted as "suspicious_connection" and delivered immediately
# (urgent flush) instead of waiting for the next batch interval.
connection_tracking:
  enabled: true
  # How often to snapshot active connections (seconds). Default: 30.
  interval_sec: 30
  # Only emit events for connections whose local port is in this list.
  # Remove or leave empty to track ALL ports.
  watch_ports: [22, 80, 443, 3306, 5432, 6379, 8080, 8443, 27017]
  # Minimum accumulated bad-event count (failed SSH, blocked, etc.) for a
  # source IP to be treated as suspicious. Default: 3.
  suspicious_threshold: 3

# Log sources to monitor
sources:
  # --- Syslog (SSH / PAM auth logs) ---
  - path: /var/log/auth.log        # Debian/Ubuntu
    format: syslog
  # - path: /var/log/secure         # RHEL/CentOS
  #   format: syslog

  # --- Nginx access log (combined format) ---
  - path: /var/log/nginx/access.log
    format: nginx
    tags:
      environment: production

  # --- PostgreSQL server log ---
  - path: /var/log/postgresql/postgresql-16-main.log
    format: postgres

  # --- MySQL error/general log ---
  - path: /var/log/mysql/error.log
    format: mysql

  # --- JSON logs (one JSON object per line) ---
  # Auto-maps: event/type/action, status, user, source_ip/ip, service, host, timestamp, ua
  - path: /var/log/myapp/events.jsonl
    format: json
    tags:
      service: myapp

  # --- CSV log (first line must be column headers) ---
  # Recognized headers: event, status, user, source_ip, host, service, timestamp, auth_method
  # - path: /var/log/audit/events.csv
  #   format: csv

  # --- Custom format (regex with named capture groups) ---
  # Use Go regex syntax. Named groups are mapped to event fields via the mapping section.
  # Any mapped field not in the standard set becomes metadata.
  #
  # Standard fields you can map to:
  #   status, user, source_ip, service, auth_method, timestamp, ua, ruser, tty, pam_type
  # Anything else becomes metadata key-value pairs.
  #
  # event value: static string OR "{{group_name}}" to use a captured group.
  #
  # See agent/custom-format-examples.yaml for ready-to-use patterns.

  # Example 1 — Custom firewall log:
  #   2024-01-15 10:30:00 DENY 203.0.113.42 -> 10.0.0.1:22 proto=tcp
  #
  # - path: /var/log/firewall.log
  #   format: custom
  #   format_parser:
  #     pattern: '(?P<ts>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}) (?P<action>ALLOW|DENY) (?P<src>[\d.]+) -> (?P<dst>[\d.:]+) proto=(?P<proto>\w+)'
  #     event: "firewall_event"
  #     mapping:
  #       timestamp: ts
  #       source_ip: src
  #       status: action
  #       destination: dst
  #       protocol: proto

  # Example 2 — Apache combined access log:
  #   203.0.113.42 - frank [10/Oct/2000:13:55:36 -0700] "GET /index.html HTTP/1.1" 200 2326 "-" "Mozilla/5.0"
  #
  # - path: /var/log/apache2/access.log
  #   format: custom
  #   format_parser:
  #     pattern: '^(?P<ip>[\d.]+) \S+ (?P<user>\S+) \[(?P<ts>[^\]]+)\] "(?P<method>\S+) (?P<path>\S+) \S+" (?P<code>\d+) \d+ "[^"]*" "(?P<ua>[^"]*)"'
  #     event: "http_request"
  #     mapping:
  #       source_ip: ip
  #       user: user
  #       timestamp: ts
  #       ua: ua
  #       method: method
  #       path: path
  #       status_code: code

  # Example 3 — HAProxy TCP log:
  #   Jan  3 12:00:00 haproxy[1234]: 203.0.113.42:54321 [03/Jan/2026:12:00:00.000] frontend backend/server 0/0/1/2/3 200 512 - - ---- 10/5/2/1/0 0/0 "GET / HTTP/1.1"
  #
  # - path: /var/log/haproxy.log
  #   format: custom
  #   format_parser:
  #     pattern: '(?P<ts>\w{3}\s+\d{1,2} \d{2}:\d{2}:\d{2}) haproxy\[\d+\]: (?P<src>[\d.]+):\d+ \[.*?\] (?P<fe>\S+) (?P<be>\S+) [\d/]+ (?P<code>\d+)'
  #     event: "haproxy_request"
  #     mapping:
  #       timestamp: ts
  #       source_ip: src
  #       status_code: code
  #       frontend: fe
  #       backend: be

  # Example 4 — Fail2ban action log:
  #   2026-01-15 10:30:00,123 fail2ban.actions [INFO] [sshd] Ban 203.0.113.42
  #
  # - path: /var/log/fail2ban.log
  #   format: custom
  #   format_parser:
  #     pattern: '(?P<ts>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}),\d+ fail2ban\.\w+ \[\w+\] \[(?P<jail>\w+)\] (?P<action>Ban|Unban) (?P<ip>[\d.]+)'
  #     event: "fail2ban_{{action}}"
  #     mapping:
  #       timestamp: ts
  #       source_ip: ip
  #       service: jail
